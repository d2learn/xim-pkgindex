# .github/workflows/pkgindex-deploy.yml

name: Deploy PkgIndex Site

on:
  push:
    branches:
      - main
    paths:
      - 'pkgs/**'
      - '.xpkgindex.json'

  # Manual trigger for deployment
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install xpkgindex
        run: pip install git+https://github.com/d2learn/xpkgindex.git

      - name: Generate static site
        run: xpkgindex generate . --output site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
